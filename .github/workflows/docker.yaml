name: docker

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.1.7
        with:
          fetch-tags: ${{ inputs.version }}
      - name: build docker image
        run: |
          echo "Building docker image ${{ inputs.version }} "
          echo "DOCKER IMAGE BUILDED"
      - name: push docker image
        run: |
          echo "Pushing docker image ${{ inputs.version }} to ${{ inputs.environment }}"
          echo "DOCKER IMAGE PUSHED"
