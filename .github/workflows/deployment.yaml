name: Deployment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      version:
        required: true
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}

jobs:
  deploy:
    name: "Deployment"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: checkout code
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          ref: ${{ inputs.version }}
      - name: deploy
        run: |
          echo "Deploying the app version ${{ inputs.version }} to ${{ inputs.environment }}"